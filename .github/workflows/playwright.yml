name: Pytest Playwright CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      CI: "true"
      PYTHONUNBUFFERED: "1"
      TICKTICK_API_URL: ${{ secrets.TICKTICK_API_URL }}
      API_KEY: ${{ secrets.API_KEY }}
      PROJECT_ID: ${{ secrets.PROJECT_ID }}
      TICKTICK_USERNAME: ${{ secrets.TICKTICK_USER }}
      TICKTICK_PASSWORD: ${{ secrets.TICKTICK_PASS }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Validate required secrets
        if: github.event_name != 'pull_request'
        run: |
          test -n "$TICKTICK_API_URL"
          test -n "$API_KEY"
          test -n "$PROJECT_ID"
          test -n "$TICKTICK_USERNAME"
          test -n "$TICKTICK_PASSWORD"

      - name: Install Playwright browser
        run: uv run python -m playwright install --with-deps chromium

      - name: Set TickTick state path
        run: echo "TICKTICK_STATE_PATH=$RUNNER_TEMP/ticktick-state.json" >> "$GITHUB_ENV"

      - name: Generate TickTick login state
        if: github.event_name != 'pull_request'
        run: xvfb-run -a uv run python pages/web/generate_state.py

      - name: Run tests on PR without real login
        if: github.event_name == 'pull_request'
        run: uv run pytest -m "not login_required" --browser chromium --tracing=retain-on-failure

      - name: Run tests with real login
        if: github.event_name != 'pull_request'
        run: uv run pytest --browser chromium --tracing=retain-on-failure

      - name: Upload failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts-${{ github.run_number }}
          retention-days: 3
          path: |
            test-results/
            reports/screenshots/
            reports/logs/pytest-logs.log
            !**/*state*.json
            !**/storage_state.json
            !**/.auth/**

      - name: Clean TickTick login state
        if: always()
        run: rm -f "$TICKTICK_STATE_PATH"
