name: Pytest Playwright CI - Regression Tests

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      CI: "true"
      PYTHONUNBUFFERED: "1"
      TICKTICK_API_URL: ${{ secrets.TICKTICK_API_URL }}
      API_KEY: ${{ secrets.API_KEY }}
      PROJECT_ID: ${{ secrets.PROJECT_ID }}
      TICKTICK_USERNAME: ${{ secrets.TICKTICK_USER }}
      TICKTICK_PASSWORD: ${{ secrets.TICKTICK_PASS }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Validate required secrets
        run: |
          test -n "$TICKTICK_API_URL"
          test -n "$API_KEY"
          test -n "$PROJECT_ID"
          test -n "$TICKTICK_USERNAME"
          test -n "$TICKTICK_PASSWORD"

      - name: Install Playwright browser
        run: uv run python -m playwright install --with-deps chromium

      - name: Set TickTick state path
        run: echo "TICKTICK_STATE_PATH=$RUNNER_TEMP/ticktick-state.json" >> "$GITHUB_ENV"

      - name: Generate TickTick login state
        run: xvfb-run -a uv run python pages/web/generate_state.py

      - name: Run regression tests
        run: |
          mkdir -p reports/site/regression
          uv run pytest -m "regression" --browser chromium --tracing=retain-on-failure \
            --html=reports/site/regression/index.html --self-contained-html

      - name: Generate GitHub Pages landing page
        if: always()
        run: |
          mkdir -p reports/site
          touch reports/site/.nojekyll
          cat > reports/site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>TickTick Automation Reports</title>
              <style>
                body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.5; }
                main { max-width: 720px; }
                a { display: block; margin: 0.75rem 0; font-size: 1.1rem; }
              </style>
            </head>
            <body>
              <main>
                <h1>TickTick Automation Reports</h1>
                <p>Latest published pytest HTML reports.</p>
                <a href="./sanity/">Sanity report</a>
                <a href="./regression/">Regression report</a>
              </main>
            </body>
          </html>
          HTML

      - name: Upload regression HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-html-report-${{ github.run_number }}
          retention-days: 14
          if-no-files-found: warn
          path: reports/site/

      - name: Publish regression HTML report to GitHub Pages
        if: ${{ always() && github.event_name == 'workflow_dispatch' && hashFiles('reports/site/regression/index.html') != '' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./reports/site
          keep_files: true

      - name: Upload regression failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: regression-playwright-failure-artifacts-${{ github.run_number }}
          retention-days: 3
          path: |
            test-results/
            reports/screenshots/
            reports/logs/pytest-logs.log
            !**/*state*.json
            !**/storage_state.json
            !**/.auth/**

      - name: Clean TickTick login state
        if: always()
        run: rm -f "$TICKTICK_STATE_PATH"
